events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name d3v.ninja;
        return 301 https://d3v.ninja$request_uri;
    }

    server {
        listen 443 ssl;
        server_name d3v.ninja;
        ssl_certificate     /etc/letsencrypt/live/d3v.ninja/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/d3v.ninja/privkey.pem;

        # Serve React build
        root /var/www/airport-companion;
        index index.html;

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        # API proxy
        location /api/ {
            proxy_pass         http://127.0.0.1:8000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-Proto https;
        }

        # WebSocket proxy
        location /ws/ {
            proxy_pass         http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_read_timeout 3600;
        }
    }
}
